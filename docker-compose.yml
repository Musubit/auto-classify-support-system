services:
  elasticsearch:
    image: docker.1ms.run/library/elasticsearch:8.19.17
    container_name: acss-es
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data
      - ./docker/es/elasticsearch.yml:/usr/share/elasticsearch/config/elasticsearch.yml

  ollama:
    image: docker.xuanyuan.run/ollama/ollama:latest
    container_name: acss-ollama
    ports:
      - "11434:11434"
    volumes:
      # 模型持久化：宿主机目录挂载，方便备份/迁移
      - ./ollama_data:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    environment:
      - NVIDIA_VISIBLE_DEVICES=all

  nlp:
    build: ./nlp
    container_name: acss-nlp
    ports:
      - "5005:5005"

  backend:
    build: ./backend
    container_name: acss-backend
    ports:
      - "5000:5000"
    env_file:
      - .env
    depends_on:
      - elasticsearch
      - nlp

  frontend:
    build: ./frontend
    container_name: acss-frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  es_data:
